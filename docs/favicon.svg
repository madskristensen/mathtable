<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- App icon background -->
  <rect width="100" height="100" rx="22" fill="#c44208"/>

  <!-- ── Ears (orange base, white inner triangle) ── -->
  <polygon points="16,52 26,8  44,48" fill="#e8640e"/>
  <polygon points="56,48 74,8  84,52" fill="#e8640e"/>
  <polygon points="20,49 27,16 41,47" fill="#fff" opacity="0.92"/>
  <polygon points="59,47 73,16 80,49" fill="#fff" opacity="0.92"/>

  <!-- ── Head ── -->
  <circle cx="50" cy="60" r="34" fill="#e8640e"/>

  <!-- subtle top-of-head shadow for depth -->
  <ellipse cx="50" cy="40" rx="22" ry="10" fill="#c44208" opacity="0.25"/>

  <!-- ── White face / muzzle ── -->
  <ellipse cx="50" cy="68" rx="24" ry="20" fill="#fff" opacity="0.95"/>

  <!-- ── Cheek blush ── -->
  <circle cx="28" cy="68" r="7" fill="#e05030" opacity="0.28"/>
  <circle cx="72" cy="68" r="7" fill="#e05030" opacity="0.28"/>

  <!-- ── Eyes ── -->
  <circle cx="37" cy="57" r="5.5" fill="#1a1209"/>
  <circle cx="63" cy="57" r="5.5" fill="#1a1209"/>
  <!-- shine -->
  <circle cx="39"  cy="54.5" r="2"   fill="#fff"/>
  <circle cx="65"  cy="54.5" r="2"   fill="#fff"/>
  <circle cx="38.2" cy="58.2" r="0.9" fill="#fff" opacity="0.6"/>
  <circle cx="64.2" cy="58.2" r="0.9" fill="#fff" opacity="0.6"/>

  <!-- ── Nose ── -->
  <ellipse cx="50" cy="67" rx="4"   ry="3"   fill="#1a1209"/>
  <ellipse cx="49" cy="66" rx="1.4" ry="1"   fill="#fff" opacity="0.45"/>

  <!-- ── Mouth ── -->
  <path d="M43 74 Q50 80 57 74" stroke="#1a1209" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <line x1="50" y1="67" x2="50" y2="74" stroke="#1a1209" stroke-width="1.4" stroke-linecap="round"/>

</svg>
