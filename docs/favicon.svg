<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- App icon background -->
  <rect width="100" height="100" rx="22" fill="#1a4d7a"/>

  <!-- ── Earth globe ── -->
  <circle cx="50" cy="50" r="38" fill="#4a9fd8"/>

  <!-- ── Continents (simplified landmasses) ── -->
  <!-- North America -->
  <path d="M25,28 Q20,25 18,22 L22,18 Q28,20 32,22 L35,28 Q32,35 28,38 L25,35 Q23,32 25,28 Z" fill="#7bc96f" opacity="0.95"/>

  <!-- South America -->
  <path d="M28,42 L32,45 Q30,52 28,58 L24,60 Q22,56 23,52 L25,48 Q27,45 28,42 Z" fill="#7bc96f" opacity="0.95"/>

  <!-- Africa -->
  <path d="M48,38 Q52,36 56,38 L58,42 Q60,48 58,54 L55,58 Q52,60 48,58 L45,52 Q44,46 46,42 L48,38 Z" fill="#7bc96f" opacity="0.95"/>

  <!-- Europe -->
  <path d="M45,22 L50,20 L54,22 Q56,26 54,30 L50,32 Q46,30 45,26 L45,22 Z" fill="#7bc96f" opacity="0.95"/>

  <!-- Asia -->
  <path d="M60,18 Q68,16 75,20 L78,26 Q80,32 78,38 L72,42 Q68,40 65,36 L62,30 Q60,24 60,18 Z" fill="#7bc96f" opacity="0.95"/>

  <!-- Australia -->
  <path d="M68,55 Q72,54 76,56 L78,60 Q76,64 72,65 L68,63 Q66,60 68,55 Z" fill="#7bc96f" opacity="0.95"/>

  <!-- ── Cloud wisps / atmosphere effect ── -->
  <ellipse cx="35" cy="30" rx="8" ry="4" fill="#fff" opacity="0.35"/>
  <ellipse cx="65" cy="45" rx="10" ry="5" fill="#fff" opacity="0.3"/>
  <ellipse cx="42" cy="65" rx="7" ry="3" fill="#fff" opacity="0.35"/>

  <!-- ── Shadow/shading on bottom right ── -->
  <ellipse cx="62" cy="62" rx="26" ry="26" fill="#000" opacity="0.12"/>

  <!-- ── Highlight on top left ── -->
  <ellipse cx="38" cy="38" rx="18" ry="18" fill="#fff" opacity="0.2"/>

</svg>
