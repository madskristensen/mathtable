<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- rounded orange background -->
  <rect width="32" height="32" rx="7" fill="#e8540a"/>
  <!-- ears (white) -->
  <polygon points="4,12 9,2 13,12" fill="#ffffff" opacity="0.9"/>
  <polygon points="19,12 23,2 28,12" fill="#ffffff" opacity="0.9"/>
  <!-- ear inner -->
  <polygon points="5.5,11 9,4.5 12,11" fill="#e8540a"/>
  <polygon points="20,11 23,4.5 26.5,11" fill="#e8540a"/>
  <!-- head -->
  <ellipse cx="16" cy="19" rx="11" ry="9.5" fill="#ffffff" opacity="0.93"/>
  <!-- snout -->
  <ellipse cx="16" cy="22" rx="5.5" ry="4" fill="#fcd9b0"/>
  <!-- eyes -->
  <circle cx="12" cy="17.5" r="1.6" fill="#1c1917"/>
  <circle cx="20" cy="17.5" r="1.6" fill="#1c1917"/>
  <circle cx="12.7" cy="16.9" r="0.55" fill="#ffffff"/>
  <circle cx="20.7" cy="16.9" r="0.55" fill="#ffffff"/>
  <!-- nose -->
  <ellipse cx="16" cy="21.2" rx="1.2" ry="0.85" fill="#1c1917"/>
  <!-- smile -->
  <path d="M13.5 23 Q16 25 18.5 23" stroke="#1c1917" stroke-width="0.9" fill="none" stroke-linecap="round"/>
</svg>
